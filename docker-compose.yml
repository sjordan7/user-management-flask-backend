version: "3.9"

services:

  web:
    build: .
    command: gunicorn -c gunicorn.conf.py run:app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A app.celery_app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis