version: "3.9"

services:

  web:
    build: .
    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A app.celery_app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis